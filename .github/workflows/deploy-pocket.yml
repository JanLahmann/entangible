# Deploys the Entangible Pocket demo (pocket-app/dist) to GitHub Pages.
#
# Trigger is MANUAL (workflow_dispatch) for now — run it from the Actions tab
# after enabling Pages (Settings → Pages → Source: "GitHub Actions").
# Switch to a push trigger once the demo is stable, e.g.:
#   push: { branches: [main], paths: ["pocket-app/**", "shared/**"] }
name: deploy-pocket

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # pocket-app imports the neutral top-level shared/ sources via the
      # @quantum/@shared aliases; @qamposer/react etc. resolve from pocket-app's
      # own node_modules. It is the ONE app (Entangible One) — served standalone
      # here on Pages, and at / · /?kiosk · /debug by the booth host.
      - name: Install and build pocket-app
        run: |
          npm ci
          npm run build
        working-directory: pocket-app
      - name: Run pocket tests
        run: npx vitest run
        working-directory: pocket-app
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pocket-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
