[project]
name = "qamposer-physical-host"
version = "0.1.0"
description = "FastAPI kiosk host for Entangible (milestone M2) — HTTPS origin, WS broadcast hub, optional backend proxy."
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "websockets",
    "httpx",
    "qrcode",
    "cryptography",
]

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
qamposer-physical = "qamposer_host.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qamposer_host"]
